<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0F172A"/>
  <!-- Garage door panel -->
  <rect x="96" y="160" width="320" height="220" rx="8" fill="#1E3A5F" stroke="#3B82F6" stroke-width="6"/>
  <!-- Door horizontal lines -->
  <line x1="96" y1="215" x2="416" y2="215" stroke="#3B82F6" stroke-width="4"/>
  <line x1="96" y1="270" x2="416" y2="270" stroke="#3B82F6" stroke-width="4"/>
  <line x1="96" y1="325" x2="416" y2="325" stroke="#3B82F6" stroke-width="4"/>
  <!-- Door handle -->
  <rect x="236" y="268" width="40" height="16" rx="8" fill="#3B82F6"/>
  <!-- Roof / track top -->
  <rect x="80" y="148" width="352" height="18" rx="4" fill="#3B82F6"/>
  <!-- Track left -->
  <rect x="82" y="160" width="12" height="220" rx="4" fill="#2563EB"/>
  <!-- Track right -->
  <rect x="418" y="160" width="12" height="220" rx="4" fill="#2563EB"/>
  <!-- "OP" text -->
  <text x="256" y="126" font-family="Arial, sans-serif" font-weight="900"
        font-size="52" fill="#3B82F6" text-anchor="middle">OP</text>
</svg>
